jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: windows-latest
            runtime: win-x86
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build app
        run: |
          dotnet publish "./sb1 sb2 sb3 xml to Csharp converter.csproj" \
            -c Release \
            -r ${{ matrix.runtime }} \
            -o publish/${{ matrix.runtime }} \
            -p:SelfContained=true \
            -p:PublishSingleFile=true

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Add files
        shell: pwsh
        run: |
            New-Item -ItemType Directory -Force -Path "./publish/${{matrix.runtime}}/ConverterIcon"
            Copy-Item "./ConverterIcon/Converter.ico" "./publish/${{matrix.runtime}}/ConverterIcon/Converter.ico"
            New-Item -ItemType Directory -Force -Path "./publish/${{matrix.runtime}}/ScratchConverter"
            Copy-Item "./ScratchConverter/Convert.js" "./publish/${{matrix.runtime}}/ScratchConverter/Convert.js"
            Copy-Item "./ScratchConverter/package.json" "./publish/${{matrix.runtime}}/ScratchConverter/package.json"
            Copy-Item "./ScratchConverter/package-lock.json" "./publish/${{matrix.runtime}}/ScratchConverter/package-lock.json"

      - name: Pack Velopack
        run: |
          vpk pack \
            -u Converter \
            -v 0.9.${{ github.run_number }} \
            --packDir "./publish/${{matrix.runtime}}" \
            --channel ${{ matrix.runtime }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpk-${{ matrix.runtime }}
          path: Releases/

 release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./Releases
          merge-multiple: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github \
            --publish \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --token "$GITHUB_TOKEN" \
            --releaseName "Converter 0.9.${{ github.run_number }}" \
            --tag "v0.9.${{ github.run_number }}" \
            --releaseDir "./Releases"
