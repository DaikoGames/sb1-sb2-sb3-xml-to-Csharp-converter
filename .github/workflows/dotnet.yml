name: Deploy to GitHub Releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-to-github-releases:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Project building
        id: get-version
        shell: bash
        run: |
              echo "version=$(grep -oE '<Version>[^<]+' "./sb1 sb2 sb3 xml to Csharp converter.csproj"| sed 's/<Version>//')" >> $GITHUB_OUTPUT
      - name: win-x64 build
        run: dotnet publish "./sb1 sb2 sb3 xml to Csharp converter.csproj" -c Release -o publish -r win-x64 --self-contained true
        
      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Create and Upload Velopack Release
        run: |
          vpk pack -u Converter -v ${{ steps.get-version.outputs.version }} --packDir "./publish" --channel win
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --publish --releaseName "Converter ${{ steps.get-version.outputs.version }}" --tag v${{ steps.get-version.outputs.version }} --channel win
