name: Deploy to GitHub Releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-to-github-releases:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Project building
        id: get-version
        shell: bash
        run: |
             echo "version=0.9.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: win-x64 build
        run: dotnet publish "./sb1 sb2 sb3 xml to Csharp converter.csproj" -c Release -o publish -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -p:PublishTrimmed=false
        
      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
      - name: important files to PATH
        shell: pwsh
        run: |
            New-Item -ItemType Directory -Force -Path "./publish/ConverterIcon"
            Copy-Item "./ConverterIcon/Converter.ico" "./publish/ConverterIcon/Converter.ico"
            New-Item -ItemType Directory -Force -Path "./publish/ScratchConverter"
            Copy-Item "./ScratchConverter/Convert.js" "./publish/Convert.js"
            Copy-Item ".ScratchConverter/package.json" "./publish/package.json"
            Copy-Item ".ScratchConverter/package-lock.json" "./publish/package-lock.json"
            
        
      - name: Create and Upload Velopack Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          vpk pack -u Converter -v ${{ steps.get-version.outputs.version }} --packDir "./publish" --channel win
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}  --publish --releaseName "Converter ${{ steps.get-version.outputs.version }}"  --tag v${{ steps.get-version.outputs.version }} --channel win
