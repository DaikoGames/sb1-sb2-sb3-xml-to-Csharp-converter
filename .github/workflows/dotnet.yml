name: Deploy to GitHub Releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-to-github-releases:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Project building
        id: get-version
        shell: bash
        run: |
             echo "version=0.9.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Run win-x64
        run: dotnet build "./sb1 sb2 sb3 xml to Csharp converter.csproj" -c Release
      - name: win-x64 build
        run: dotnet publish "./sb1 sb2 sb3 xml to Csharp converter.csproj" -c Release -o publish -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true
        
      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Create and Upload Velopack Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          vpk pack -u Converter -v ${{ steps.get-version.outputs.version }} --packDir "./publish" --channel win
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}  --publish --releaseName "Converter ${{ steps.get-version.outputs.version }}"  --tag v${{ steps.get-version.outputs.version }} --channel win
