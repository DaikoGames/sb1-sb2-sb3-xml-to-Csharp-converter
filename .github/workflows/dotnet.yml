name: Deploy to GitHub Releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: windows-latest
            runtime: win-x86
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build and Publish App
        shell: bash
        run: |
          dotnet publish "./sb1 sb2 sb3 xml to Csharp converter.csproj" \
            -c Release \
            -r ${{ matrix.runtime }} \
            -o "./publish/${{ matrix.runtime }}" \
            -p:SelfContained=true \
            -p:PublishSingleFile=true

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Add Extra Files (Icons & Scripts)
        shell: pwsh
        run: |
          # Zielordner definieren (muss im packDir liegen!)
          $baseDir = "./publish/${{ matrix.runtime }}"
          
          # Icon kopieren
          New-Item -ItemType Directory -Force -Path "$baseDir/ConverterIcon"
          Copy-Item "./ConverterIcon/Converter.ico" "$baseDir/ConverterIcon/Converter.ico"
          
          # ScratchConverter Dateien kopieren
          New-Item -ItemType Directory -Force -Path "$baseDir/ScratchConverter"
          Copy-Item "./ScratchConverter/Convert.js" "$baseDir/ScratchConverter/Convert.js"
          Copy-Item "./ScratchConverter/package.json" "$baseDir/ScratchConverter/package.json"
          Copy-Item "./ScratchConverter/package-lock.json" "$baseDir/ScratchConverter/package-lock.json"

      - name: Pack with Velopack
        shell: bash
        run: |
          vpk pack \
            -u "Converter" \
            -v "0.9.${{ github.run_number }}" \
            --packDir "./publish/${{ matrix.runtime }}" \
            --outputDir "./Releases" \
            --channel "${{ matrix.runtime }}"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpk-${{ matrix.runtime }}
          path: Releases/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./Releases
          merge-multiple: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github \
            --publish \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --token "$GITHUB_TOKEN" \
            --releaseName "Converter 0.9.${{ github.run_number }}" \
            --tag "v0.9.${{ github.run_number }}" \
            --out "./Releases"
