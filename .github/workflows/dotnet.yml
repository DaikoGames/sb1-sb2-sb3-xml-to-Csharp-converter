name: Deploy to GitHub Releases
on: 
  schedule:
     - cron: '30 14 * * 6' 
  workflow_dispatch:
     
permissions:
  contents: write


   
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: windows-latest
            runtime: win-x86
          - os: ubuntu-latest
            runtime: linux-x64
          - os: ubuntu-latest
            runtime: linux-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: macos-latest
            runtime: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build and Publish App
        shell: bash
        run: |
          dotnet publish "./sb1 sb2 sb3 xml to Csharp converter.csproj" \
            -c Release \
            -r ${{ matrix.runtime }} \
            -o "./publish/${{ matrix.runtime }}" \
            -p:SelfContained=true \
            -p:PublishSingleFile=true

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Add files (Windows)
        shell: pwsh
        if: contains(matrix.runtime, 'win')  
        run: |
          $baseDir = "./publish/${{ matrix.runtime }}"
          New-Item -ItemType Directory -Force -Path "$baseDir/ConverterIcon"
          Copy-Item "./ConverterIcon/Converter.ico" "$baseDir/ConverterIcon/Converter.ico"
          New-Item -ItemType Directory -Force -Path "$baseDir/ScratchConverter"
          Copy-Item "./ScratchConverter/Convert.js" "$baseDir/ScratchConverter/Convert.js"
          Copy-Item "./ScratchConverter/package.json" "$baseDir/ScratchConverter/package.json"
          Copy-Item "./ScratchConverter/package-lock.json" "$baseDir/ScratchConverter/package-lock.json"
          New-Item -ItemType Directory -Force -Path "$baseDir/Install"
          Copy-Item "./Install/dotnet-install.ps1" "$baseDir/Install/dotnet-install.ps1"
          
      - name: Add Files (Linux, MacOS)
        shell: pwsh
        if: contains(matrix.runtime, 'linux') || contains(matrix.runtime, 'osx')
        run: |
          $baseDir = "./publish/${{ matrix.runtime }}"
          New-Item -ItemType Directory -Force -Path "$baseDir/ConverterIcon"
          Copy-Item "./ConverterIcon/Converter.ico" "$baseDir/ConverterIcon/Converter.ico"
          New-Item -ItemType Directory -Force -Path "$baseDir/ScratchConverter"
          Copy-Item "./ScratchConverter/Convert.js" "$baseDir/ScratchConverter/Convert.js"
          Copy-Item "./ScratchConverter/package.json" "$baseDir/ScratchConverter/package.json"
          Copy-Item "./ScratchConverter/package-lock.json" "$baseDir/ScratchConverter/package-lock.json"
          New-Item -ItemType Directory -Force -Path "$baseDir/Install"
          Copy-Item "./Install/dotnet-install.sh" "$baseDir/Install/dotnet-install.sh"
          
      - name: Check Help
        shell: bash
        run: |
          vpk pack --help
          
      - name: Pack with Velopack
        shell: bash
        run: |
          vpk pack \
            -u "Converter" \
            -v "0.9.${{ github.run_number }}" \
            --packDir "./publish/${{ matrix.runtime }}" \
            --outputDir "./Releases" \
            --channel "${{ matrix.runtime }}"
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpk-${{ matrix.runtime }}
          path: ./Releases/
          
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-releases
          pattern: vpk-artifacts-*
          merge-multiple: true # This puts all files from all matrix runs into one folder

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.9.${{ github.run_number }}
          name: Release v0.9.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            ./all-releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
